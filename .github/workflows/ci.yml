name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  checks:
    name: Typecheck · Lint · Build · Test
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.33.1
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: Lint
        run: pnpm lint

      - name: Build
        env:
          # Staging/prod deploys use real values; CI uses placeholders so the
          # build completes. Actual Sentry ingestion and DB access happen at
          # runtime, not build — Prisma generate reads the schema only.
          SENTRY_DSN: ''
          NEXT_PUBLIC_SENTRY_DSN: ''
          DATABASE_URL: 'postgresql://ci:ci@localhost:5432/ci?pgbouncer=true'
          DIRECT_URL: 'postgresql://ci:ci@localhost:5432/ci'
          NEXT_PUBLIC_SUPABASE_URL: 'https://ci.placeholder.supabase.co'
          NEXT_PUBLIC_SUPABASE_ANON_KEY: 'ci-placeholder'
          SUPABASE_SERVICE_ROLE_KEY: 'ci-placeholder'
          KONCIE_SIGNED_LINK_SECRET: 'ci-placeholder-at-least-32-chars-long-xxx'
          RESEND_API_KEY: ''
          NEXT_PUBLIC_SITE_URL: 'http://localhost:3000'
        run: pnpm build

      - name: Test
        env:
          KONCIE_SIGNED_LINK_SECRET: 'ci-placeholder-at-least-32-chars-long-xxx'
        run: pnpm test

  e2e:
    name: Playwright E2E
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: checks
    # E2E requires a live Supabase + Resend. CI runs with placeholder env
    # vars so the Playwright specs fail at DB time. Marked continue-on-error
    # until Sprint 3 wires up a test Supabase project (or testcontainers
    # + Docker) for this job.
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.1
          run_install: false
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @koncie/web exec playwright install --with-deps chromium
      - env:
          DATABASE_URL: 'postgresql://ci:ci@localhost:5432/ci?pgbouncer=true'
          DIRECT_URL: 'postgresql://ci:ci@localhost:5432/ci'
          NEXT_PUBLIC_SUPABASE_URL: 'https://ci.placeholder.supabase.co'
          NEXT_PUBLIC_SUPABASE_ANON_KEY: 'ci-placeholder'
          SUPABASE_SERVICE_ROLE_KEY: 'ci-placeholder'
          KONCIE_SIGNED_LINK_SECRET: 'ci-placeholder-at-least-32-chars-long-xxx'
          NEXT_PUBLIC_SITE_URL: 'http://localhost:3000'
        run: pnpm --filter @koncie/web test:e2e
